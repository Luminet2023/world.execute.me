        :root {
            --bg-color: #030305;
            --main-cyan: #00f3ff;
            --main-pink: #ff00ea;
            --main-green: #00ff66;
            --main-red: #ff2a2a;

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            color: var(--main-cyan);
            font-family: var(--font-term);

            user-select: none;
            -webkit-font-smoothing: antialiased;

            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* 终端 UI 层 */
        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            padding: 3vw 5vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* 文本容器 */
        #terminal-output {
            max-height: 80vh;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* CRT 显示器扫描线与曲面滤镜 */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            box-shadow: inset 0 0 10vw rgba(0,0,0,0.9);
        }
        .crt-overlay::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0; z-index: 2; pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        /* 全局状态切换 */
        .theme-ac { filter: hue-rotate(90deg) contrast(1.2); }
        .theme-dc { filter: hue-rotate(-90deg) contrast(1.5); }
        .theme-blind { filter: blur(8px) brightness(0.4) contrast(2); transition: filter 0.5s; }
        .theme-time { animation: timeWarp 3s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .screen-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both infinite; }

        /* 开始按钮 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 1s;
        }
        #start-screen h1 {
            font-family: var(--font-display); font-size: 4rem; color: var(--text-main);
            text-shadow: var(--glow-cyan); margin-bottom: 20px;
        }
        #start-screen p {
            font-size: 1.5rem; color: var(--main-pink); animation: pulse 1s infinite alternate;
        }

        /* 终端打字文本 */
        .term-line {
            font-size: 1.2rem;
            line-height: 1.4;
            color: var(--text-main);
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            display: flex; align-items: flex-start;
            animation: slideUp 0.3s ease-out forwards;

        .prompt-symbol { color: var(--main-pink); margin-right: 15px; font-weight: bold; }
        .term-cursor {
            display: inline-block; width: 10px; height: 1.2rem;
            background-color: var(--main-cyan); margin-left: 5px;
            animation: blink 1s step-end infinite;

        .emphasis-text {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            margin: 20px 0;

        .emphasis-red { color: var(--main-red); text-shadow: var(--glow-red); }

            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; opacity: 0.8;
        }
        .glitch-text::before {
            color: #0ff; z-index: -1; transform: translate(-3px, 2px);
            animation: glitch-anim-1 0.2s infinite alternate-reverse;
        }
        .glitch-text::after {
            color: #f0f; z-index: -2; transform: translate(3px, -2px);
            animation: glitch-anim-2 0.3s infinite alternate-reverse;
        }

            background: rgba(0, 243, 255, 0.05);
            padding: 15px; margin: 15px 0;

        .string { color: var(--main-green); }

        .progress-bar { height: 100%; background: var(--main-cyan); width: 0%; box-shadow: var(--glow-cyan); transition: width 2s cubic-bezier(0.1, 0.8, 0.2, 1); }

        /* 经典的 BSOD 蓝屏 */
        #bsod-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0000aa; color: #ffffff;
            font-family: 'Lucida Console', monospace;
            text-shadow: none;
            display: flex; flex-direction: column; justify-content: center; align-items: center;

        .bsod-dump { font-size: 0.8em; margin-top: 2em; }

        /* DOM 特效元素 */
        .emoji-blast {
            position: absolute; font-size: 5rem;
            transform: translate(-50%, -50%);

            z-index: 20; filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));

        .spam-3d {
            position: absolute; font-family: var(--font-display); font-weight: 900;
            color: var(--main-red); text-shadow: var(--glow-red);
            white-space: nowrap; pointer-events: none;
        }

        /* 自定义 MDUI 对话框层级 */
        mdui-dialog {
            z-index: 2000;
            font-family: var(--font-term);
        }

        /* 动画定义 */
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes pulse { from { opacity: 0.5; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0) rotate(-45deg); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } }
        @keyframes shake { 
            0% { transform: translate(2px, 1px) rotate(0deg); } 
            10% { transform: translate(-1px, -2px) rotate(-1deg); } 
            20% { transform: translate(-3px, 0px) rotate(1deg); } 
            30% { transform: translate(0px, 2px) rotate(0deg); } 
            40% { transform: translate(1px, -1px) rotate(1deg); } 
            50% { transform: translate(-1px, 2px) rotate(-1deg); } 
            60% { transform: translate(-3px, 1px) rotate(0deg); } 
            70% { transform: translate(2px, 1px) rotate(-1deg); } 
            80% { transform: translate(-1px, -1px) rotate(1deg); } 
            90% { transform: translate(2px, 2px) rotate(0deg); } 
            100% { transform: translate(1px, -2px) rotate(-1deg); } 
        }
        @keyframes timeWarp { 
            0% { filter: hue-rotate(0deg) scale(1); } 
            50% { filter: hue-rotate(180deg) scale(1.1) invert(0.8) contrast(2); } 
            100% { filter: hue-rotate(360deg) scale(1); } 
        }
        @keyframes glitch-anim-1 { 
            0% { clip-path: inset(20% 0 80% 0); } 
            20% { clip-path: inset(60% 0 10% 0); } 
            40% { clip-path: inset(40% 0 50% 0); } 
            60% { clip-path: inset(80% 0 5% 0); } 
            80% { clip-path: inset(10% 0 70% 0); } 
            100% { clip-path: inset(30% 0 50% 0); } 
        }
        @keyframes glitch-anim-2 { 
            0% { clip-path: inset(10% 0 60% 0); } 
            20% { clip-path: inset(30% 0 20% 0); } 
            40% { clip-path: inset(70% 0 10% 0); } 
            60% { clip-path: inset(20% 0 50% 0); } 
            80% { clip-path: inset(90% 0 5% 0); } 
            100% { clip-path: inset(50% 0 30% 0); } 
        }
    </style>
</head>

            { time: 162.6, action: () => { clearTerminal(); printLine("If I can, If I can give them all the"); } },

            { time: 188.4, action: () => { clearTerminal(); printLine("Though you are free...", { color: '#888' }); } },

            { time: 205.8, action: () => { clearTerminal(); printEmphasis("EXECUTION", "red"); engineState.mode = 'IDLE'; } },
        ];

        let currentIndex = 0;
        let isPlaying = false;

        /**
         * START AUDIO LOOP
         */
        startScreen.addEventListener('click', () => {
            if(isPlaying) return;
            startScreen.style.opacity = '0';
            setTimeout(() => startScreen.style.display = 'none', 1000);
            
            audio.play().then(() => {
                isPlaying = true;
                requestAnimationFrame(mainLoop);
            }).catch(e => {
                startScreen.style.opacity = '1';
                startScreen.innerHTML = `<h1 style="color:red; font-size:2rem;">ERROR: AUDIO BLOCKED OR MISSING</h1><p>Ensure browser allows autoplay and network is connected.</p>`;
            });
        });

        function mainLoop() {
            if (!isPlaying) return;
            const t = audio.currentTime;
            
            // Timeline Check
            while (currentIndex < timeline.length && t >= timeline[currentIndex].time) {
                timeline[currentIndex].action();
                currentIndex++;
            }

            // Render Canvas Backgrounds
            renderCanvas(t);

            if (!audio.ended) {
                requestAnimationFrame(mainLoop);
            }
        }

        /**
         * UI / DOM MANIPULATION FUNCTIONS
         */
        function printLine(text, options = {}) {
            const line = document.createElement('div');
            line.className = 'term-line';
            if (options.color) line.style.color = `var(--main-${options.color})` || options.color;
            if (options.fade) line.style.opacity = 0.5;
            
            let textHtml = `<span class="prompt-symbol">C:\\></span>`;
            if(options.glitch) {
                textHtml += `<span class="text glitch-text" data-text="${text}"></span>`;
            } else {
                textHtml += `<span class="text"></span>`;
            }
            textHtml += `<span class="term-cursor"></span>`;
            
            line.innerHTML = textHtml;
            terminal.appendChild(line);
            
            // Auto scroll
            terminal.scrollTop = terminal.scrollHeight;
            
            // Typewriter effect
            const textSpan = line.querySelector('.text');
            const cursor = line.querySelector('.term-cursor');
            let i = 0;
            const typeTimer = setInterval(() => {
                if (i < text.length) {
                    textSpan.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeTimer);
                    setTimeout(() => cursor.remove(), 1000);
                }
            }, 30);
        }

        function printEmphasis(text, colorType) {
            const el = document.createElement('div');
            el.className = `emphasis-text emphasis-${colorType} glitch-text`;
            el.setAttribute('data-text', text);
            el.textContent = text;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function printCodeSnippet() {
            const el = document.createElement('div');
            el.className = 'hud-box';
            el.innerHTML = `> OBJECT INITIALIZATION...<br>
<span class="keyword">class</span> <span class="func">Me</span> {<br>
&nbsp;&nbsp;<span class="keyword">constructor</span>(<span class="string">'you'</span>) {<br>
&nbsp;&nbsp;&nbsp;&nbsp;<span class="keyword">this</span>.world = <span class="string">'you'</span>;<br>
&nbsp;&nbsp;&nbsp;&nbsp;<span class="keyword">this</span>.existence = <span class="keyword">new</span> <span class="func">Promise</span>();<br>
&nbsp;&nbsp;}<br>
}`;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function printHUDProgress() {
            const el = document.createElement('div');
            el.className = 'hud-box';
            el.innerHTML = `> MAPPING DATA PARAMETERS...
            <div class="progress-container"><div class="progress-bar" id="prog-bar-1"></div></div>`;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;
            setTimeout(() => {
                const bar = document.getElementById('prog-bar-1');
                if(bar) bar.style.width = '100%';
            }, 100);
        }

        function printTrappedCode() {
            const el = document.createElement('div');
            el.className = 'hud-box';
            el.style.borderColor = 'var(--main-pink)';
            el.style.boxShadow = 'var(--glow-pink)';
            el.innerHTML = `> SYSTEM.STATUS: TRAPPED<br>
<span class="keyword">while</span>(<span class="keyword">true</span>) {<br>
&nbsp;&nbsp;<span class="keyword">this</span>.<span class="func">love</span>(<span class="string">'you'</span>);<br>
} <span style="color:var(--main-pink); animation:pulse 0.5s infinite alternate">♥</span>`;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            terminal.innerHTML = '';
        }

        function toggleClass(el, cls, duration) {
            el.classList.add(cls);
            if (duration) setTimeout(() => el.classList.remove(cls), duration);
        }

        function shakeScreen(duration) {
            toggleClass(document.body, 'screen-shake', duration);
        }

        function spawnEmoji(char) {
            const el = document.createElement('div');
            el.className = 'emoji-blast';
            el.textContent = char;
            el.style.left = `${Math.random() * 60 + 20}vw`;
            el.style.top = `${Math.random() * 60 + 20}vh`;
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity=0; el.style.transition='opacity 0.5s'; setTimeout(()=>el.remove(), 500); }, 2000);
        }

        function spawnSoundWaves() {
            // Simulated by printing wavy text
            printGiantFloating("~~~~ ~~~~ ~~~~", "pink");
        }

        function printGiantFloating(text, color = "cyan") {
            const el = document.createElement('div');
            el.className = `spam-3d emphasis-${color}`;
            el.textContent = text;
            el.style.left = `${Math.random() * 80 + 10}vw`;
            el.style.top = `${Math.random() * 80 + 10}vh`;
            el.style.fontSize = `${Math.random() * 3 + 3}rem`;
            el.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 40 - 20}deg)`;
            el.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity=0; el.style.transition='all 0.5s'; setTimeout(()=>el.remove(), 500); }, 1500);
        }

        // Spam System
        let spamInterval = null;
        function startSpamExecution() {
            spamInterval = setInterval(() => {
                const el = document.createElement('div');
                el.className = 'spam-3d emphasis-red glitch-text';
                el.setAttribute('data-text', 'EXECUTION');
                el.textContent = 'EXECUTION';
                
                // Random 3D Transform
                const scale = Math.random() * 2 + 1;
                const rotZ = Math.random() * 60 - 30;
                const tx = Math.random() * 100;
                const ty = Math.random() * 100;
                
                el.style.left = `${tx}vw`; el.style.top = `${ty}vh`;
                el.style.transform = `translate(-50%, -50%) scale(${scale}) rotateZ(${rotZ}deg)`;
                el.style.zIndex = Math.floor(Math.random() * 100);
                el.style.filter = `blur(${Math.random() * 3}px)`;
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), Math.random() * 800 + 400);
            }, 80); // Very fast spawn
        }
        function stopSpam() {
            if(spamInterval) clearInterval(spamInterval);
            document.querySelectorAll('.spam-3d').forEach(el => el.remove());
        }

        /**
         * CANVAS RENDER ENGINE (High Performance)
         */
        
        // Matrix Rain Setup
        const matrixChars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const fontSize = 18;
        let columns = 0;
        let drops = [];
        function initMatrixRain() {
            columns = Math.floor(cw / fontSize);
            drops = [];
            for (let x = 0; x < columns; x++) drops[x] = 1;
        }

        // Geometry Data
        let geoState = { step: '', points: [], sinePhase: 0 };
        function initGeoPoints() {
            geoState.points = [];
            for(let i=0; i<60; i++) {
                geoState.points.push({ x: Math.random()*cw, y: Math.random()*ch, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 });
            }
        }

        // Particle System Data
        let particles = [];
        function spawnParticles(x, y, color) {
            for(let i=0; i<30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 5;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1.0, decay: Math.random() * 0.02 + 0.01,
                    color: color, size: Math.random() * 4 + 2
                });
            }
        }

        // Draw Loop Delegate
        function renderCanvas(t) {
            engineState.frame++;
            
            // Global Composite & Clear
            ctx.globalCompositeOperation = 'source-over';
            
            if (engineState.mode === 'RAIN') {
                ctx.fillStyle = 'rgba(3, 3, 5, 0.15)'; // Trail effect
                ctx.fillRect(0, 0, cw, ch);
            } else if (engineState.mode === 'GLITCH') {
                ctx.fillStyle = `rgba(${Math.random()*50}, ${Math.random()*10}, ${Math.random()*10}, 0.3)`;
                ctx.fillRect(0, 0, cw, ch);
            } else {
                ctx.fillStyle = 'rgba(3, 3, 5, 0.3)'; // Fast fade for geometry/particles
                ctx.fillRect(0, 0, cw, ch);
            }

            ctx.globalCompositeOperation = 'lighter'; // Neon glowing

            switch (engineState.mode) {
                case 'RAIN': drawMatrixRain(); break;
                case 'GEOMETRY': drawGeometry(t); break;
                case 'PARTICLES': drawParticles(); break;
                case 'HEART': drawHeart(t); break;
                case 'LIGHTNING': drawLightning(); break;
                case 'SHIELD': drawShield(t); break;
                case 'UNITE': drawUnite(t); break;
                case 'GLITCH': drawGlitchNoise(); break;
            }
        }

        function drawMatrixRain() {
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                
                // Head of drop is bright cyan/white, tail is dim green
                ctx.fillStyle = Math.random() > 0.9 ? '#fff' : (Math.random() > 0.5 ? '#00f3ff' : '#00ff66');
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                ctx.shadowBlur = 0; // reset
                
                if (drops[i] * fontSize > ch && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        function drawGeometry(t) {
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f3ff';

            const cx = cw/2; const cy = ch/2;

            if (geoState.step === 'POINTS') {
                if(geoState.points.length === 0) initGeoPoints();
                ctx.fillStyle = '#00f3ff';
                geoState.points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0||p.x>cw) p.vx*=-1; if(p.y<0||p.y>ch) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                });
            } 
            else if (geoState.step === 'CIRCLE') {
                // Expanding circle
                const maxR = Math.min(cw, ch) * 0.35;
                const r = (Math.sin(t * 5) * 0.1 + 0.9) * maxR; 
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
                
                // Inner concentric circles
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.3)';
                ctx.beginPath(); ctx.arc(cx, cy, r*0.8, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, r*0.6, 0, Math.PI*2); ctx.stroke();
            }
            else if (geoState.step === 'SINE' || geoState.step === 'TANGENTS' || geoState.step === 'LIMITS') {
                geoState.sinePhase += 0.1;
                const amp = ch * 0.2;
                const freq = 0.005;
                
                // Draw Sine
                ctx.beginPath();
                for(let x=0; x<cw; x+=5) {
                    const y = cy + Math.sin(x * freq + geoState.sinePhase) * amp;
                    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke();

                // Draw Tangents
                if (geoState.step === 'TANGENTS' || geoState.step === 'LIMITS') {
                    ctx.strokeStyle = '#ff00ea'; ctx.shadowColor = '#ff00ea'; ctx.lineWidth = 1.5;
                    for(let i=1; i<=5; i++) {
                        const x = (cw/6) * i;
                        const y = cy + Math.sin(x * freq + geoState.sinePhase) * amp;
                        // Derivative: A * cos(w*x + p) * w
                        const slope = amp * freq * Math.cos(x * freq + geoState.sinePhase);
                        const dx = 100; const dy = slope * dx;
                        ctx.beginPath();
                        ctx.moveTo(x - dx, y - dy);
                        ctx.lineTo(x + dx, y + dy);
                        ctx.stroke();
                        // Draw point
                        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
                    }
                }

                // Draw Limits
                if (geoState.step === 'LIMITS') {
                    ctx.strokeStyle = '#ff2a2a'; ctx.shadowColor = '#ff2a2a'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(0, cy - amp - 20); ctx.lineTo(cw, cy - amp - 20); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, cy + amp + 20); ctx.lineTo(cw, cy + amp + 20); ctx.stroke();
                }
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function drawHeart(t) {
            // Parametric Heart Equation
            const cx = cw / 2; const cy = ch / 2 - 50;
            const scale = 15 + Math.sin(t * 8) * 2; // Pulsing beat
            
            ctx.strokeStyle = '#ff00ea';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff00ea';
            
            ctx.beginPath();
            for (let i = 0; i < Math.PI * 2; i += 0.05) {
                // x = 16 sin^3(t)
                const x = 16 * Math.pow(Math.sin(i), 3);
                // y = 13 cos(t) - 5 cos(2t) - 2 cos(3t) - cos(4t)
                const y = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
                
                if (i === 0) ctx.moveTo(cx + x * scale, cy + y * scale);
                else ctx.lineTo(cx + x * scale, cy + y * scale);
            }
            ctx.closePath();
            ctx.stroke();

            // Fill with faint glow
            ctx.fillStyle = 'rgba(255, 0, 234, 0.1)';
            ctx.fill();
        }

        function drawLightning() {
            ctx.strokeStyle = '#00f3ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f3ff';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            let x = Math.random() * cw;
            let y = 0;
            ctx.moveTo(x, y);
            while(y < ch) {
                x += (Math.random() - 0.5) * 100;
                y += Math.random() * 50;
                ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Occasional screen flash
            if(Math.random() > 0.8) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fillRect(0,0,cw,ch);
            }
        }

        function drawShield(t) {
            const cx = cw/2; const cy = ch/2;
            ctx.strokeStyle = '#00f3ff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff'; ctx.lineWidth = 4;
            
            // Hexagon shield
            const r = 200 + Math.sin(t * 10) * 10;
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                const angle = i * Math.PI / 3 + t;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function drawUnite(t) {
            const cx = cw/2; const cy = ch/2;
            const r1 = (t * 200) % (cw/2);
            const r2 = (t * 150) % (cw/2);
            
            ctx.strokeStyle = '#ff00ea'; ctx.lineWidth = 5; ctx.shadowBlur = 20; ctx.shadowColor = '#ff00ea';
            ctx.beginPath(); ctx.arc(cx, cy, r1, 0, Math.PI*2); ctx.stroke();
            
            ctx.strokeStyle = '#00f3ff'; ctx.shadowColor = '#00f3ff';
            ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI*2); ctx.stroke();
        }

        function drawGlitchNoise() {
            // Static noise lines
            ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#ff2a2a';
            for(let i=0; i<10; i++) {
                ctx.fillRect(Math.random()*cw, Math.random()*ch, Math.random()*cw, Math.random()*10);
            }
        }

    </script>
