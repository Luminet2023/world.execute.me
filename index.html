<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>world.execute(me) // REMASTERED</title>

    <!-- 引入 MDUI 2 -->
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #010803;
            --main-primary: #00ff41;
            --main-secondary: #008f11;
            --main-highlight: #adff2f;
            --main-red: #ff3333;
            --main-yellow: #ffea00;
            --text-main: #b8e0c6;

            --font-term: 'Fira Code', 'Share Tech Mono', monospace;
            --font-display: 'Orbitron', sans-serif;

            --glow-primary: 0 0 10px rgba(0, 255, 65, 0.8), 0 0 20px rgba(0, 255, 65, 0.5);
            --glow-secondary: 0 0 10px rgba(0, 143, 17, 0.8), 0 0 20px rgba(0, 143, 17, 0.5);
            --glow-highlight: 0 0 10px rgba(173, 255, 47, 0.8), 0 0 20px rgba(173, 255, 47, 0.5);
            --glow-red: 0 0 10px rgba(255, 51, 51, 0.8), 0 0 20px rgba(255, 51, 51, 0.5);
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 强制拦截 MDUI 动态取色引擎对页面背景的污染 */
            background-color: var(--bg-color) !important;
            color: var(--main-primary);
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.8s ease;
        }

        /* 背景 Canvas 渲染层 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* 终端 UI 层 */
        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            padding: 3vw 5vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* 文本容器 */
        #terminal-output {
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* CRT 显示器扫描线与曲面滤镜 */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.9);
        }

        .crt-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        /* 全局状态切换 */
        .theme-ac {
            filter: hue-rotate(90deg) contrast(1.2);
        }

        .theme-dc {
            filter: hue-rotate(-90deg) contrast(1.5);
        }

        .theme-blind {
            filter: blur(8px) brightness(0.4) contrast(2);
            transition: filter 0.5s;
        }

        .theme-time {
            animation: timeWarp 3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .theme-dizzy {
            animation: dizzyFlash 0.8s cubic-bezier(.36, .07, .19, .97) forwards;
        }

        .screen-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both infinite;
        }

        /* 强制纯黑背景类 */
        .bg-black {
            --bg-color: #000000 !important;
        }

        /* 开始按钮 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1s;
        }

        #start-screen h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            color: var(--text-main);
            text-shadow: var(--glow-primary);
            margin-bottom: 20px;
        }

        #start-screen p {
            font-size: 1.5rem;
            color: var(--main-highlight);
            animation: pulse 1s infinite alternate;
        }

        /* 终端打字文本 */
        .term-line {
            font-size: 1.2rem;
            line-height: 1.4;
            color: var(--text-main);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: flex-start;
            animation: slideUp 0.3s ease-out forwards;
        }

        .prompt-symbol {
            color: var(--main-primary);
            text-shadow: var(--glow-primary);
            margin-right: 15px;
            font-weight: bold;
        }

        .term-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: var(--main-primary);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        /* 重点文字大字报 */
        .emphasis-text {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 8px;
            color: var(--main-primary);
            text-shadow: var(--glow-primary);
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            position: relative;
        }

        .emphasis-highlight {
            color: var(--main-highlight);
            text-shadow: var(--glow-highlight);
        }

        .emphasis-primary {
            color: var(--main-primary);
            text-shadow: var(--glow-primary);
        }

        .emphasis-red {
            color: var(--main-red);
            text-shadow: var(--glow-red);
        }

        .emphasis-pink {
            color: var(--main-pink);
            text-shadow: var(--glow-pink);
        }

        /* 渐变粉色与纯黑背景 */
        .love-phase-1 {
            --bg-color: #000000 !important;
            --main-primary: #88ffaa;
            --text-main: #ccffdd;
            --glow-primary: 0 0 10px rgba(136, 255, 170, 0.8), 0 0 20px rgba(136, 255, 170, 0.5);
        }

        .love-phase-2 {
            --bg-color: #000000 !important;
            --main-primary: #ff88cc;
            --text-main: #ffccdd;
            --glow-primary: 0 0 10px rgba(255, 136, 204, 0.8), 0 0 20px rgba(255, 136, 204, 0.5);
        }

        .love-phase-3 {
            --bg-color: #000000 !important;
            --main-primary: #ff00ea;
            --text-main: #ffb3e6;
            --glow-primary: 0 0 10px rgba(255, 0, 234, 0.8), 0 0 20px rgba(255, 0, 234, 0.5);
            /* 将代码块的高亮颜色在最终阶段全部转为粉色系 */
            --main-highlight: #ff66cc;
            --main-secondary: #ff99dd;
            --main-yellow: #ff33bb;
        }

        /* 故障毛刺特效 */
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            color: #00ff41;
            z-index: -1;
            transform: translate(-3px, 2px);
            animation: glitch-anim-1 0.2s infinite alternate-reverse;
        }

        .glitch-text::after {
            color: #ff3333;
            z-index: -2;
            transform: translate(3px, -2px);
            animation: glitch-anim-2 0.3s infinite alternate-reverse;
        }

        /* 代码块与进度条 */
        .hud-box {
            border: 1px solid var(--main-primary);
            background: rgba(0, 255, 65, 0.05);
            padding: 15px;
            margin: 15px 0;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
        }

        .keyword {
            color: var(--main-highlight);
        }

        .string {
            color: var(--main-secondary);
        }

        .func {
            color: var(--main-yellow);
        }

        .progress-container {
            width: 100%;
            height: 20px;
            border: 1px solid var(--main-primary);
            margin-top: 10px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--main-primary);
            width: 0%;
            box-shadow: var(--glow-primary);
            transition: width 2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* 经典的 BSOD 蓝屏 */
        #bsod-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0000aa;
            color: #ffffff;
            font-family: 'Lucida Console', monospace;
            text-shadow: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
            padding: 2em;
        }

        .bsod-text {
            font-size: 1.2em;
            text-align: left;
            max-width: 900px;
            line-height: 1.5;
        }

        .bsod-dump {
            font-size: 0.8em;
            margin-top: 2em;
        }

        /* DOM 特效元素 */
        .emoji-blast {
            position: absolute;
            font-size: 5rem;
            transform: translate(-50%, -50%);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 20;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
        }

        .spam-3d {
            position: absolute;
            font-family: var(--font-display);
            font-weight: 900;
            color: var(--main-red);
            text-shadow: var(--glow-red);
            white-space: nowrap;
            pointer-events: none;
        }

        /* 经典的复古图标块 (Retro Icon Block) */
        .retro-icon-block {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px 0 15px 45px;
            font-size: 4rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6));
        }

        /* 自定义 MDUI 对话框层级 */
        mdui-dialog {
            z-index: 2000;
            font-family: var(--font-term);
        }

        /* 调试工具栏 */
        #debug-tools {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1001;
            display: flex;
            gap: 8px;
        }

        .debug-btn {
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(4px);
            color: var(--main-primary) !important;
            border-color: var(--main-primary) !important;
        }

        /* 动画定义 */
        @keyframes blink {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-45deg);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes dizzyFlash {
            0% {
                filter: blur(0px) contrast(1);
                transform: scale(1);
            }

            25% {
                filter: blur(12px) contrast(1.5) brightness(1.2);
                transform: scale(1.05) skewX(3deg);
            }

            50% {
                filter: blur(0px) contrast(1);
                transform: scale(1);
            }

            75% {
                filter: blur(15px) contrast(2) brightness(1.5);
                transform: scale(1.08) skewX(-3deg);
            }

            100% {
                filter: blur(0px) contrast(1);
                transform: scale(1);
            }
        }

        @keyframes shake {
            0% {
                transform: translate(2px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(0px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(2px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(2px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }

        @keyframes timeWarp {
            0% {
                filter: hue-rotate(0deg) scale(1);
            }

            50% {
                filter: hue-rotate(180deg) scale(1.1) invert(0.8) contrast(2);
            }

            100% {
                filter: hue-rotate(360deg) scale(1);
            }
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
            }

            100% {
                clip-path: inset(30% 0 50% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 20% 0);
            }

            40% {
                clip-path: inset(70% 0 10% 0);
            }

            60% {
                clip-path: inset(20% 0 50% 0);
            }

            80% {
                clip-path: inset(90% 0 5% 0);
            }

            100% {
                clip-path: inset(50% 0 30% 0);
            }
        }
    </style>
</head>

<body>

    <!-- 调试工具栏 -->
    <div id="debug-tools">
        <mdui-button variant="outlined" id="btn-pause-toggle" class="debug-btn"
            style="color: var(--main-pink); border-color: var(--main-pink);">PAUSE</mdui-button>
    </div>

    <!-- 调试：时间调整弹窗 -->
    <mdui-dialog id="debug-dialog" headline="🛠️ DEBUG: 时间轴跳转">
        <div style="padding: 20px 0;">
            <mdui-slider id="time-slider" min="0" max="210" step="0.1" value="0"></mdui-slider>
            <div style="text-align: center; margin-top: 15px; font-size: 1.2rem; color: var(--main-primary);">
                TARGET TIME: <span id="time-display">0.0</span> s
            </div>
            <div style="text-align: center; margin-top: 5px; font-size: 0.9rem; color: var(--text-main); opacity: 0.7;">
                (建议跳转如 29.7, 43.5, 74.0, 147.6 等卡点)
            </div>
        </div>
        <mdui-button slot="action" variant="text" id="btn-debug-cancel"
            style="color: var(--text-main);">取消</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-debug-confirm"
            style="background-color: var(--main-primary); color: #000;">执行跳转</mdui-button>
    </mdui-dialog>

    <!-- 光敏性癫痫警告弹窗 -->
    <mdui-dialog id="warning-dialog" headline="⚠️ 光敏性癫痫警告" close-on-esc="false" close-on-overlay-click="false">
        本网页体验包含强烈的视觉闪烁、色差特效（Glitch Art）以及高频率变动的图形动画。<br><br>
        如果您本人或您的家属有<b>光敏性癫痫</b>病史，或对闪烁光线极其敏感，请立即停止体验。<br>
        在观看过程中如感到头晕、不适，请立即闭上眼睛并关闭此页面。<br><br>
        您是否了解风险并确认继续执行程序？
        <mdui-button slot="action" variant="text" id="btn-decline" style="color: var(--main-red);">退出程序</mdui-button>
        <mdui-button slot="action" variant="filled" id="btn-accept"
            style="background-color: var(--main-primary); color: #000;">确认执行</mdui-button>
    </mdui-dialog>

    <!-- 启动画面 -->
    <div id="start-screen" style="display: none;">
        <h1 class="glitch-text" data-text="world.execute(me);">world.execute(me);</h1>
        <p>[ CLICK TO INITIATE SEQUENCE ]</p>
    </div>

    <!-- 背景渲染层 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 核心UI层 -->
    <div id="ui-layer">
        <div id="terminal-output"></div>
    </div>

    <!-- CRT 遮罩层 -->
    <div class="crt-overlay"></div>

    <!-- 音频源 -->
    <audio id="bgm" preload="auto">
        <source src="https://webstatic.luminet.cn/project/world.execute.me/world-execute-me.wav" type="audio/wav">
    </audio>

    <script>
        // 全局控制变量
        let doomSpamInterval = null;
        let flashInt = null;

        /**
         * MDUI 2 DIALOG SETUP
         */
        document.addEventListener("DOMContentLoaded", () => {
            const dialog = document.getElementById('warning-dialog');
            const startScreen = document.getElementById('start-screen');
            const btnAccept = document.getElementById('btn-accept');
            const btnDecline = document.getElementById('btn-decline');

            customElements.whenDefined('mdui-dialog').then(() => {
                setTimeout(() => {
                    dialog.open = true;
                }, 300);
            });

            btnAccept.addEventListener('click', () => {
                dialog.open = false;
                startScreen.style.display = 'flex';
            });

            btnDecline.addEventListener('click', () => {
                window.location.href = 'about:blank';
            });
        });

        /**
         * DEBUG TIME JUMP & PAUSE SETUP
         */
        document.addEventListener("DOMContentLoaded", () => {
            const btnDebugOpen = document.getElementById('btn-debug-open');
            const debugDialog = document.getElementById('debug-dialog');
            const timeSlider = document.getElementById('time-slider');
            const timeDisplay = document.getElementById('time-display');
            const btnDebugCancel = document.getElementById('btn-debug-cancel');
            const btnDebugConfirm = document.getElementById('btn-debug-confirm');
            const btnPauseToggle = document.getElementById('btn-pause-toggle');

            btnPauseToggle.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    btnPauseToggle.innerHTML = 'PLAY';
                } else if (audio.currentTime > 0 && !audio.ended) {
                    audio.play();
                    isPlaying = true;
                    btnPauseToggle.innerHTML = 'PAUSE';
                    requestAnimationFrame(mainLoop);
                }
            });

            btnDebugOpen.addEventListener('click', () => {
                const maxTime = audio.duration && !isNaN(audio.duration) ? audio.duration : 210;
                timeSlider.max = maxTime;
                timeSlider.value = audio.currentTime;
                timeDisplay.innerText = audio.currentTime.toFixed(1);
                debugDialog.open = true;
            });

            timeSlider.addEventListener('input', (e) => {
                timeDisplay.innerText = parseFloat(e.target.value).toFixed(1);
            });

            btnDebugCancel.addEventListener('click', () => {
                debugDialog.open = false;
            });

            btnDebugConfirm.addEventListener('click', () => {
                const t = parseFloat(timeSlider.value);

                audio.currentTime = t;

                currentIndex = 0;
                while (currentIndex < timeline.length && timeline[currentIndex].time <= t) {
                    currentIndex++;
                }

                clearTerminal();

                if (doomSpamInterval) clearInterval(doomSpamInterval);
                if (flashInt) clearInterval(flashInt);

                document.body.className = '';
                document.body.style.filter = 'none';
                engineState.mode = 'IDLE';
                geoState.step = '';

                // 修复跳转背景同步逻辑
                if (t >= 88.5 && t < 177.2) {
                    document.body.classList.add('bg-black');
                }

                if (t >= 16.0 && t < 29.5) { engineState.mode = 'RAIN'; if (drops.length === 0) initMatrixRain(); }
                else if (t >= 29.7 && t < 44.4) {
                    engineState.mode = 'GEOMETRY';
                    if (t >= 43.5) geoState.step = 'LIMITS';
                    else if (t >= 40.0) geoState.step = 'TANGENTS';
                    else if (t >= 37.0) geoState.step = 'SINE';
                    else if (t >= 33.4) geoState.step = 'CIRCLE';
                    else geoState.step = 'POINTS';
                }
                else if (t >= 56.9 && t < 74.0) { engineState.mode = 'UNITE'; }
                else if (t >= 74.0 && t < 85.0) { engineState.mode = 'PARTICLES'; }
                else if (t >= 85.0 && t < 87.9) { engineState.mode = 'LIGHTNING'; }
                else if (t >= 131.2 && t < 133.5) { engineState.mode = 'GLITCH'; }
                else if (t >= 177.2 && t < 188.4) {
                    engineState.mode = 'BLACKOUT';
                    if (t >= 187.6) engineState.mode = 'HEART';

                    if (t >= 184.5) document.body.className = 'love-phase-3';
                    else if (t >= 180.8) document.body.className = 'love-phase-2';
                    else document.body.className = 'love-phase-1';
                }
                else if (t >= 188.4) {
                    document.body.className = 'love-phase-3';
                    if (t >= 205.8) engineState.mode = 'GLITCH';
                }

                hideBSOD();
                stopSpam();
                document.querySelectorAll('.spam-3d, .emoji-blast, #final-execution-text').forEach(el => el.remove());

                printLine(`>>> DEBUG: JUMPED TO ${t.toFixed(1)}s`, { color: 'yellow' });

                debugDialog.open = false;

                if (!isPlaying && audio.currentTime > 0) {
                    audio.play();
                    isPlaying = true;
                    btnPauseToggle.innerHTML = 'PAUSE';
                    requestAnimationFrame(mainLoop);
                }
            });
        });

        /**

        function printTimelineTravel() {
            const el = document.createElement('div');
            el.className = 'hud-box';
            el.innerHTML = `> TEMPORAL.DISPLACEMENT.ACTIVE<br>
            <div style="display:flex; align-items:center; margin-top:15px; margin-bottom:10px;">
                <span style="width: 50px; text-align:right; font-weight:bold; color:var(--main-yellow);">B.C.</span>
                <div style="flex-grow:1; height:2px; background:var(--main-primary); position:relative; margin:0 15px;">
                    <div id="timeline-marker" style="position:absolute; top:-4px; right:0%; width:10px; height:10px; background:var(--main-highlight); border-radius:50%; box-shadow:var(--glow-highlight); transition: right 2.5s cubic-bezier(0.25, 0.1, 0.25, 1);"></div>
                </div>
                <span style="width: 50px; font-weight:bold; color:var(--main-red);">A.D.</span>
            </div>
            <div style="text-align:center; font-size:1.2rem; font-weight:bold;" id="year-display">2024 A.D.</div>`;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;

            setTimeout(() => {
                const marker = el.querySelector('#timeline-marker');
                const yearDisp = el.querySelector('#year-display');
                if (marker) marker.style.right = '100%';

                let startYear = 2024;
                let targetYear = -500;
                let startTime = Date.now();
                const duration = 2500;

                function updateYear() {
                    let now = Date.now();
                    let progress = (now - startTime) / duration;
                    if (progress > 1) progress = 1;

                    let easeProgress = 1 - Math.pow(1 - progress, 3);
                    let currentYear = Math.round(startYear + (targetYear - startYear) * easeProgress);

                    if (currentYear > 0) {
                        yearDisp.textContent = `${currentYear} A.D.`;
                        yearDisp.style.color = "var(--main-red)";
                    } else {
                        yearDisp.textContent = `${Math.abs(currentYear)} B.C.`;
                        yearDisp.style.color = "var(--main-yellow)";
                    }

                    if (progress < 1) {
                        requestAnimationFrame(updateYear);
                    }
                }
                requestAnimationFrame(updateYear);
            }, 100);
        }

            el.style.zIndex = '9999';
            el.style.width = '100vw';
            el.style.margin = '0';
            el.id = 'final-execution-text';
            document.body.appendChild(el);

            let flashCount = 0;
            if (flashInt) clearInterval(flashInt);
            flashInt = setInterval(() => {
                document.body.style.filter = flashCount % 2 === 0 ? 'invert(1) contrast(3) hue-rotate(180deg)' : 'none';
                flashCount++;
                if (flashCount > 8) {
                    clearInterval(flashInt);
                    document.body.style.filter = 'none';
                }
            }, 80);
        }

        function clearTerminal() {
            terminal.innerHTML = '';
        }

        function toggleClass(el, cls, duration) {
            el.classList.add(cls);
            if (duration) setTimeout(() => el.classList.remove(cls), duration);
        }

        function shakeScreen(duration) {
            toggleClass(document.body, 'screen-shake', duration);
        }

        function spawnEmoji(char) {
            const el = document.createElement('div');
            el.className = 'emoji-blast';
            el.textContent = char;
            el.style.left = `${Math.random() * 60 + 20}vw`;
            el.style.top = `${Math.random() * 60 + 20}vh`;
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = 0; el.style.transition = 'opacity 0.5s'; setTimeout(() => el.remove(), 500); }, 2000);
        }

        function spawnSoundWaves() {
            printGiantFloating("~~~~ ~~~~ ~~~~", "primary");
        }

        function printGiantFloating(text, color = "primary") {
            const el = document.createElement('div');
            el.className = `spam-3d emphasis-${color}`;
            el.textContent = text;
            el.style.left = `${Math.random() * 80 + 10}vw`;
            el.style.top = `${Math.random() * 80 + 10}vh`;
            el.style.fontSize = `${Math.random() * 3 + 3}rem`;
            el.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 40 - 20}deg)`;
            el.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = 0; el.style.transition = 'all 0.5s'; setTimeout(() => el.remove(), 500); }, 1500);
        }

        let spamInterval = null;
        function startSpamExecution() {
            spamInterval = setInterval(() => {
                const el = document.createElement('div');
                el.className = 'spam-3d emphasis-red glitch-text';
                el.setAttribute('data-text', 'EXECUTION');
                el.textContent = 'EXECUTION';

                const scale = Math.random() * 2 + 1;
                const rotZ = Math.random() * 60 - 30;
                const tx = Math.random() * 100;
                const ty = Math.random() * 100;

                el.style.left = `${tx}vw`; el.style.top = `${ty}vh`;
                el.style.transform = `translate(-50%, -50%) scale(${scale}) rotateZ(${rotZ}deg)`;
                el.style.zIndex = Math.floor(Math.random() * 100);
                el.style.filter = `blur(${Math.random() * 3}px)`;

                document.body.appendChild(el);
                setTimeout(() => el.remove(), Math.random() * 800 + 400);
            }, 80);
        }
        function stopSpam() {
            if (spamInterval) clearInterval(spamInterval);
            document.querySelectorAll('.spam-3d').forEach(el => el.remove());
        }

        /**
         * CANVAS RENDER ENGINE
         */

        const matrixChars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const fontSize = 18;
        let columns = 0;
        let drops = [];
        let rainSpeeds = [];

        function initMatrixRain() {
            columns = Math.floor(cw / fontSize);
            drops = [];
            rainSpeeds = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
                rainSpeeds[x] = Math.random() * 0.4 + 0.2;
            }
        }

        let geoState = { step: '', points: [], sinePhase: 0 };
        function initGeoPoints() {
            geoState.points = [];
            for (let i = 0; i < 60; i++) {
                geoState.points.push({ x: Math.random() * cw, y: Math.random() * ch, vx: (Math.random() - 0.5) * 1, vy: (Math.random() - 0.5) * 1 });
            }
        }

        let particles = [];
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1.0, decay: Math.random() * 0.02 + 0.01,
                    color: color, size: Math.random() * 4 + 2
                });
            }
        }

        function renderCanvas(t) {
            engineState.frame++;

            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            if (engineState.mode === 'IDLE') {
                ctx.clearRect(0, 0, cw, ch);
                return;
            }

            ctx.globalCompositeOperation = 'source-over';

            if (engineState.mode === 'RAIN') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, 0, cw, ch);
            } else if (engineState.mode === 'GLITCH') {
                ctx.fillStyle = `rgba(${Math.random() * 50}, 0, 0, 0.3)`;
                ctx.fillRect(0, 0, cw, ch);
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, cw, ch);
            }

            ctx.globalCompositeOperation = 'lighter';

            switch (engineState.mode) {
                case 'RAIN': drawMatrixRain(); break;
                case 'GEOMETRY': drawGeometry(t); break;
                case 'PARTICLES': drawParticles(); break;
                case 'HEART': drawHeart(t); break;
                case 'LIGHTNING': drawLightning(); break;
                case 'SHIELD': drawShield(t); break;
                case 'UNITE': drawUnite(t); break;
                case 'GLITCH': drawGlitchNoise(); break;
            }
        }

        function drawMatrixRain() {
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];

                ctx.fillStyle = Math.random() > 0.9 ? '#fff' : (Math.random() > 0.5 ? '#00ff41' : '#008f11');
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;

                const currentY = Math.floor(drops[i]) * fontSize;
                ctx.fillText(text, i * fontSize, currentY);
                ctx.shadowBlur = 0;

                if (currentY > ch && Math.random() > 0.975) {
                    drops[i] = 0;
                    rainSpeeds[i] = Math.random() * 0.4 + 0.2;
                }
                drops[i] += rainSpeeds[i];
            }
        }

        function drawGeometry(t) {
            ctx.strokeStyle = '#00ff41';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff41';

            const cx = cw / 2; const cy = ch / 2;

            if (geoState.step === 'POINTS') {
                if (geoState.points.length === 0) initGeoPoints();
                ctx.fillStyle = '#00ff41';
                geoState.points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > cw) p.vx *= -1; if (p.y < 0 || p.y > ch) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
                });
            }
            else if (geoState.step === 'CIRCLE') {
                const maxR = Math.min(cw, ch) * 0.35;
                const r = (Math.sin(t * 2) * 0.1 + 0.9) * maxR;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

                ctx.strokeStyle = 'rgba(0, 255, 65, 0.3)';
                ctx.beginPath(); ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2); ctx.stroke();
            }
            else if (geoState.step === 'SINE' || geoState.step === 'TANGENTS' || geoState.step === 'LIMITS') {
                geoState.sinePhase += 0.03;
                const amp = ch * 0.2;
                const freq = 0.005;

                ctx.beginPath();
                for (let x = 0; x < cw; x += 5) {
                    const y = cy + Math.sin(x * freq + geoState.sinePhase) * amp;
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                if (geoState.step === 'TANGENTS' || geoState.step === 'LIMITS') {
                    ctx.strokeStyle = '#adff2f'; ctx.shadowColor = '#adff2f'; ctx.lineWidth = 1.5;
                    for (let i = 1; i <= 5; i++) {
                        const x = (cw / 6) * i;
                        const y = cy + Math.sin(x * freq + geoState.sinePhase) * amp;
                        const slope = amp * freq * Math.cos(x * freq + geoState.sinePhase);
                        const dx = 100; const dy = slope * dx;
                        ctx.beginPath();
                        ctx.moveTo(x - dx, y - dy);
                        ctx.lineTo(x + dx, y + dy);
                        ctx.stroke();
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
                    }
                }

                if (geoState.step === 'LIMITS') {
                    ctx.strokeStyle = '#ff3333'; ctx.shadowColor = '#ff3333'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(0, cy - amp - 20); ctx.lineTo(cw, cy - amp - 20); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, cy + amp + 20); ctx.lineTo(cw, cy + amp + 20); ctx.stroke();
                }
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function drawHeart(t) {
            const cx = cw / 2; const cy = ch / 2 - 50;
            const scale = 15 + Math.sin(t * 4) * 2;

            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff3333';

            ctx.beginPath();
            for (let i = 0; i < Math.PI * 2; i += 0.05) {
                const x = 16 * Math.pow(Math.sin(i), 3);
                const y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));

                if (i === 0) ctx.moveTo(cx + x * scale, cy + y * scale);
                else ctx.lineTo(cx + x * scale, cy + y * scale);
            }
            ctx.closePath();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 51, 51, 0.1)';
            ctx.fill();
        }

        function drawLightning() {
            ctx.strokeStyle = '#00ff41';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00ff41';
            ctx.lineWidth = 2;

            ctx.beginPath();
            let x = Math.random() * cw;
            let y = 0;
            ctx.moveTo(x, y);
            while (y < ch) {
                x += (Math.random() - 0.5) * 100;
                y += Math.random() * 50;
                ctx.lineTo(x, y);
            }
            ctx.stroke();

            if (Math.random() > 0.9) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(0, 0, cw, ch);
            }
        }

        function drawShield(t) {
            const cx = cw / 2; const cy = ch / 2;
            ctx.strokeStyle = '#00ff41'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ff41'; ctx.lineWidth = 4;

            const r = 200 + Math.sin(t * 5) * 10;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = i * Math.PI / 3 + t * 0.5;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function drawUnite(t) {
            const cx = cw / 2; const cy = ch / 2;
            const r1 = (t * 80) % (cw / 2);
            const r2 = (t * 60) % (cw / 2);

            ctx.strokeStyle = '#adff2f'; ctx.lineWidth = 5; ctx.shadowBlur = 20; ctx.shadowColor = '#adff2f';
            ctx.beginPath(); ctx.arc(cx, cy, r1, 0, Math.PI * 2); ctx.stroke();

            ctx.strokeStyle = '#00ff41'; ctx.shadowColor = '#00ff41';
            ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI * 2); ctx.stroke();
        }

        function drawGlitchNoise() {
            ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#ff2a2a';
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(Math.random() * cw, Math.random() * ch, Math.random() * cw, Math.random() * 10);
            }
        }

    </script>
</body>
